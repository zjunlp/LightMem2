name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lightmem2-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm typecheck

      - name: Build workspace
        run: pnpm build

      - name: Check package boundaries
        run: pnpm check:boundaries

      - name: Test OpenClaw adapter
        run: pnpm --dir components/adapters/openclaw test

      - name: Test host adapter package
        run: pnpm --dir components/packages/foundation/host-adapter test

      - name: Test TokenPilot preset
        run: pnpm --dir components/presets/tokenpilot test

      - name: Test runtime core package
        run: pnpm --dir components/packages/foundation/runtime-core test

      - name: Test product surface package
        run: pnpm --dir components/packages/foundation/product-surface test
